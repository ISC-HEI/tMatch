<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>{{ subject }}</title>
</head>
<body style="margin:0; padding:0; background-color:#ffffff; font-family: Arial, Helvetica, sans-serif;">

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
         style="background-color:#ffffff;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0"
               style="max-width:600px; width:100%;">

          <!-- ═══ HEADER ═══ -->
          <tr>
            <td align="center" style="padding: 32px 40px 20px 40px;">
              <h1 style="margin:0; font-size:26px; font-weight:bold; color:#F5317B;">
                {{ subject }}
              </h1>
            </td>
          </tr>

          <!-- ═══ DIVIDER ═══ -->
          <tr>
            <td style="padding: 0 40px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="background-color:#F5317B; height:2px; font-size:0; line-height:0;">&nbsp;</td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- ═══ CONTENT ═══ -->
          <tr>
            <td style="padding: 40px 40px 20px 40px;">

              <!-- Title -->
              <p style="margin:0 0 24px 0; font-size:18px; font-weight:bold; color:#111827; text-align:center;">
                {{ title }}
              </p>

              <!-- Body text -->
              <p style="margin:0 0 40px 0; font-size:15px; color:#374151; line-height:1.7;">
                {{ content }}
              </p>

              <!-- CTA Button -->
              <table role="presentation" cellpadding="0" cellspacing="0" align="center"
                     style="margin: 0 auto 48px auto;">
                <tr>
                  <td align="center"
                      style="background: #F5317B;
                             background: linear-gradient(135deg, #F5317B 0%, #9C0740 100%);
                             border-radius:8px;">
                    <a href="{{ app_url }}"
                       style="display:inline-block; padding:22px 80px; color:#ffffff;
                              text-decoration:none; font-size:22px; font-weight:bold;
                              letter-spacing:0.5px;">
                      {{ button_text }}
                    </a>
                  </td>
                </tr>
              </table>

            </td>
          </tr>

          <!-- ═══ FOOTER ═══ -->
          <tr>
            <td style="background-color:#2d2d2d; padding:20px 32px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="right">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/b/bf/HES-SO_Valais-Wallis.png">
                  </td>
                </tr>
              </table>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
