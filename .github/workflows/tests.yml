name: Tests

on:
  push: 
  pull_request: 

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup uv
        uses: astral-sh/setup-uv@5
        with:
          enable-caching: true

      - name: Run tests
        run: |
          uv run pytest -v
